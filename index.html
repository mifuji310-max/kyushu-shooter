<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>九州シューター - 熊本ステージ</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: #000;
      overflow: hidden;
      touch-action: none;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    #game-container canvas { display: block; }
  </style>
</head>
<body>
  <div id="game-container"></div>
  <!-- ?v= はデプロイ後にスマホのキャッシュを確実に更新するためのバスター。VERSIONと一緒に上げる -->
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.70.0/dist/phaser.min.js"></script>
  <!-- 共有ランキング用 Firebase（Nmokuと同じプロジェクトを流用） -->
  <script src="https://www.gstatic.com/firebasejs/12.15.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/12.15.0/firebase-database-compat.js"></script>
  <script src="js/config.js?v=0.7.0"></script>
  <script src="js/sfx.js?v=0.7.0"></script>
  <script src="js/remote.js?v=0.7.0"></script>
  <script src="js/scenes/TitleScene.js?v=0.7.0"></script>
  <script src="js/scenes/GameScene.js?v=0.7.0"></script>
  <script src="js/scenes/GameOverScene.js?v=0.7.0"></script>
  <script src="js/scenes/LeaderboardScene.js?v=0.7.0"></script>
  <script src="js/game.js?v=0.7.0"></script>
</body>
</html>
